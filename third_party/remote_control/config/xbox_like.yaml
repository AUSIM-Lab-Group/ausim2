remote_control_node:
  ros__parameters:
    topics:
      joy: /joy
      cmd_vel: /joy/cmd_vel
    publish_rate_hz: 30.0
    joy_timeout: 0.5
    deadzone: 0.15
    require_enable_button: false
    enable_button: 4
    axes:
      linear:
        x: 4
        y: 0
        z: 1
      angular:
        yaw: 3
    scale:
      linear:
        x: 0.6
        y: 0.6
        z: 0.5
      angular:
        yaw: 1.0
    # Action slot -> (service, joystick combo, keyboard key) bindings.
    # The remote_control node only knows RC output slots and their service
    # endpoints. Receiver-side config decides what each action means.
    actions:
      action1:
        service: /joy/action1
        buttons: [4, 0]
        keyboard: "t"
      action2:
        service: /joy/action2
        buttons: [5, 0]
        keyboard: "g"
      action3:
        service: /joy/action3
        buttons: [6, 7]
        keyboard: "x"
      action4:
        service: /joy/action4
        buttons: [-1]
        keyboard: "q"
      action5:
        service: ""
        buttons: [-1]
        keyboard: ""
      action6:
        service: ""
        buttons: [-1]
        keyboard: ""
      action7:
        service: ""
        buttons: [-1]
        keyboard: ""
      action8:
        service: ""
        buttons: [-1]
        keyboard: ""
    command_cooldown: 0.5
    motion_suppress_after_command: 0.3
    keyboard:
      enabled: true
      key_timeout: 0.25
      scale:
        linear:
          x: 0.6
          y: 0.6
          z: 0.5
        angular:
          yaw: 1.0
